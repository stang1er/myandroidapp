name: Build and test

on:
  workflow_dispatch: 
  push:
    branches: [ "dev", "master" ]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        variant: [ 'play', 'website', 'huawei', 'fdroid' ]
        build_type: [ 'qa' ]
        include:
          - variant: 'huawei'
            extra_build_command_options: '-Phuawei=1'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # 🔥 مهم: جلوگیری از gradlew permission denied
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: |
          ./gradlew assemble${{ matrix.variant }}${{ matrix.build_type }} \
          ${{ matrix.extra_build_command_options }} --stacktrace

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-reports-${{ matrix.variant }}-${{ matrix.build_type }}
          path: app/build/reports
          if-no-files-found: ignore

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: session-${{ matrix.variant }}-${{ matrix.build_type }}
          path: app/build/outputs/apk/${{ matrix.variant }}/${{ matrix.build_type }}/*-universal*apk
          if-no-files-found: error


  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # 🔥 مهم برای permission
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Run tests
        run: ./gradlew testPlayDebugUnitTest --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: app/build/reports
          if-no-files-found: ignore
